    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern UI Landing Page</title>
    <style>
        /* CSS for Good UI */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 400px;
        }
        h1 { margin-bottom: 1rem; font-size: 2.5rem; }
        p { margin-bottom: 2rem; opacity: 0.9; line-height: 1.6; }
        .btn {
            background: #fff;
            color: #764ba2;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <!-- Simple HTML Structure -->
    <div class="card">
        <h1>Welcome</h1>
        <p>This is a simple, modern UI built with clean HTML and CSS to get you started on your web project.</p>
        <a href="#" class="btn">Get Started</a>
    </div>
</body>
</html>
