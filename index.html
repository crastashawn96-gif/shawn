<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Agency</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; color: #333; }
        header { background: #007bff; color: #fff; padding: 1rem; text-align: center; }
        nav a { color: #fff; margin: 0 10px; text-decoration: none; }
        .hero { background: #f4f4f4; padding: 50px; text-align: center; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 20px; text-align: center; border-radius: 5px; }
        footer { background: #333; color: #fff; text-align: center; padding: 10px; position: fixed; width: 100%; bottom: 0; }
    </style>
</head>
<body>
    <header>
        <h1>Explore The World</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#destinations">Destinations</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <div class="hero" id="home">
        <h2>Unforgettable Travel Experiences</h2>
        <p>Book your next adventure with us.</p>
    </div>

    <div class="container" id="destinations">
        <h2>Popular Destinations</h2>
        <div class="grid">
            <div class="card"><h3>Paris</h3><p>Romantic getaway</p></div>
            <div class="card"><h3>Bali</h3><p>Tropical paradise</p></div>
            <div class="card"><h3>Rome</h3><p>Historical journey</p></div>
        </div>
    </div>

    <div class="container" id="contact" style="padding-bottom: 60px;">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" required><br><br>
            <input type="email" placeholder="Your Email" required><br><br>
            <textarea placeholder="Your Message"></textarea><br><br>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Travel Agency. All rights reserved.</p>
    </footer>
</body>
</html>
